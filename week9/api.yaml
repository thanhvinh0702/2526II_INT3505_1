openapi: 3.0.0
info:
  title: Product API
  version: 1.0.0

servers:
  - url: /api/v1

paths:
  /products:
    get:
      summary: Get all products
      responses:
        '200':
          description: List of products
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductList'

    post:
      summary: Create product
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductInput'
      responses:
        '201':
          description: Product created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'

  /products/{id}:
    get:
      summary: Get product by id
      parameters:
        - $ref: '#/components/parameters/ProductId'
      responses:
        '200':
          description: Product detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'

    put:
      summary: Update product
      parameters:
        - $ref: '#/components/parameters/ProductId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductInput'
      responses:
        '200':
          description: Updated product
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'

    delete:
      summary: Delete product
      parameters:
        - $ref: '#/components/parameters/ProductId'
      responses:
        '200':
          description: Delete success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteResponse'

components:
  parameters:
    ProductId:
      name: id
      in: path
      required: true
      schema:
        type: string

  schemas:
    Product:
      type: object
      properties:
        id:
          type: string
          example: "64f123abc"
        name:
          type: string
          example: "iPhone 15"
        price:
          type: number
          example: 999
        description:
          type: string
          example: "Latest Apple phone"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ProductInput:
      type: object
      required:
        - name
        - price
      properties:
        name:
          type: string
          example: "iPhone 15"
        price:
          type: number
          example: 999
        description:
          type: string
          example: "Latest Apple phone"

    ProductList:
      type: array
      items:
        $ref: '#/components/schemas/Product'

    DeleteResponse:
      type: object
      properties:
        message:
          type: string
          example: "Deleted successfully"